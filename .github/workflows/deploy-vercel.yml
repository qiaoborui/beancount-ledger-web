name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      target:
        description: Vercel target environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || github.event_name == 'workflow_dispatch' && inputs.target || 'preview' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy
        id: deploy
        shell: bash
        run: |
          if [[ -z "$VERCEL_TOKEN" || -z "$VERCEL_ORG_ID" || -z "$VERCEL_PROJECT_ID" ]]; then
            echo "Missing VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID secret" >&2
            exit 1
          fi

          target="preview"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            target="production"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target }}"
          fi

          pull_args=(--yes --environment="$target" --token="$VERCEL_TOKEN")
          if [[ "$target" == "preview" && -n "${GITHUB_HEAD_REF:-}" ]]; then
            pull_args+=(--git-branch="$GITHUB_HEAD_REF")
          fi

          deploy_args=(--yes --token="$VERCEL_TOKEN")
          if [[ "$target" == "production" ]]; then
            deploy_args+=(--prod)
          else
            deploy_args+=(--target="$target")
          fi

          vercel pull "${pull_args[@]}"
          url="$(vercel deploy "${deploy_args[@]}")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          {
            echo "## Vercel deployment"
            echo
            echo "- Target: \`$target\`"
            echo "- URL: $url"
          } >> "$GITHUB_STEP_SUMMARY"
