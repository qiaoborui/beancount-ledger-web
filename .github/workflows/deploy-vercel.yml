name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      target:
        description: Vercel target environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || github.event_name == 'workflow_dispatch' && inputs.target || 'preview' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel deployment
        id: deploy
        shell: bash
        run: |
          if [[ -z "$VERCEL_TOKEN" || -z "$VERCEL_ORG_ID" || -z "$VERCEL_PROJECT_ID" ]]; then
            echo "Missing VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID secret" >&2
            exit 1
          fi

          target="preview"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            target="production"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target }}"
          fi

          git_ref="${GITHUB_REF_NAME}"
          git_sha="${GITHUB_SHA}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git_ref="${{ github.event.pull_request.head.ref }}"
            git_sha="${{ github.event.pull_request.head.sha }}"
          fi

          echo "Waiting for Vercel $target deployment for $git_ref@$git_sha"
          deadline=$((SECONDS + 1200))
          deployment=""
          while (( SECONDS < deadline )); do
            deployments="$(
              curl --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&limit=20"
            )"
            deployment="$(
              jq -c \
                --arg sha "$git_sha" \
                --arg ref "$git_ref" \
                --arg target "$target" \
                '.deployments
                  | map(select(.meta.githubCommitSha == $sha and .meta.githubCommitRef == $ref))
                  | map(select(if $target == "production" then .target == "production" else .target != "production" end))
                  | sort_by(.createdAt)
                  | reverse
                  | .[0] // empty' <<< "$deployments"
            )"
            if [[ -n "$deployment" ]]; then
              state="$(jq -r '.state // empty' <<< "$deployment")"
              url="$(jq -r '.url // empty' <<< "$deployment")"
              echo "Vercel deployment state: ${state:-unknown} ${url:+https://$url}"
              case "$state" in
                READY)
                  url="https://$url"
                  echo "url=$url" >> "$GITHUB_OUTPUT"
                  break
                  ;;
                ERROR|CANCELED|BLOCKED)
                  jq . <<< "$deployment" >&2
                  exit 1
                  ;;
              esac
            else
              echo "No matching Vercel deployment yet."
            fi
            sleep 15
          done

          if [[ -z "$deployment" || "$(jq -r '.state // empty' <<< "$deployment")" != "READY" ]]; then
            echo "Timed out waiting for Vercel deployment for $git_ref@$git_sha" >&2
            exit 1
          fi

          {
            echo "## Vercel deployment"
            echo
            echo "- Target: \`$target\`"
            echo "- URL: $url"
          } >> "$GITHUB_STEP_SUMMARY"
