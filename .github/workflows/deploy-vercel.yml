name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      target:
        description: Vercel target environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || github.event_name == 'workflow_dispatch' && inputs.target || 'preview' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install --global vercel@54.9.1

      - name: Deploy
        id: deploy
        shell: bash
        run: |
          if [[ -z "$VERCEL_TOKEN" || -z "$VERCEL_ORG_ID" || -z "$VERCEL_PROJECT_ID" ]]; then
            echo "Missing VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID secret" >&2
            exit 1
          fi

          target="preview"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            target="production"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target }}"
          fi

          git_ref="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git_ref="${{ github.event.pull_request.head.ref }}"
          fi

          request_body="$(mktemp)"
          if [[ "$target" == "production" ]]; then
            jq -n \
              --arg name "${{ github.event.repository.name }}" \
              --arg project "$VERCEL_PROJECT_ID" \
              --arg ref "$git_ref" \
              --argjson repoId "${{ github.event.repository.id }}" \
              '{
                name: $name,
                project: $project,
                target: "production",
                gitSource: {
                  type: "github",
                  repoId: $repoId,
                  ref: $ref
                }
              }' > "$request_body"
          else
            jq -n \
              --arg name "${{ github.event.repository.name }}" \
              --arg project "$VERCEL_PROJECT_ID" \
              --arg ref "$git_ref" \
              --argjson repoId "${{ github.event.repository.id }}" \
              '{
                name: $name,
                project: $project,
                gitSource: {
                  type: "github",
                  repoId: $repoId,
                  ref: $ref
                }
              }' > "$request_body"
          fi

          response="$(
            curl --silent --show-error \
              --request POST \
              --header "Authorization: Bearer $VERCEL_TOKEN" \
              --header "Content-Type: application/json" \
              --data @"$request_body" \
              "https://api.vercel.com/v13/deployments?teamId=$VERCEL_ORG_ID"
          )"
          url="$(jq -r '.url // empty' <<< "$response")"
          if [[ -z "$url" || "$url" == "null" ]]; then
            echo "Vercel API did not return a deployment URL" >&2
            jq . <<< "$response" >&2
            exit 1
          fi
          if [[ "$url" != https://* ]]; then
            url="https://$url"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

          inspect_output="$(mktemp)"
          if ! vercel inspect "$url" --wait --timeout 20m --format=json --token="$VERCEL_TOKEN" | tee "$inspect_output"; then
            vercel inspect "$url" --logs --token="$VERCEL_TOKEN" || true
            exit 1
          fi

          ready_state="$(
            awk 'found { print } /{/ { found = 1; sub(/^[^{]*/, ""); print }' "$inspect_output" | jq -r '.readyState // empty'
          )"
          if [[ "$ready_state" != "READY" ]]; then
            echo "Vercel deployment did not become READY; readyState=$ready_state" >&2
            vercel inspect "$url" --logs --token="$VERCEL_TOKEN" || true
            exit 1
          fi

          {
            echo "## Vercel deployment"
            echo
            echo "- Target: \`$target\`"
            echo "- URL: $url"
          } >> "$GITHUB_STEP_SUMMARY"
