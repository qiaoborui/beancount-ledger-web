name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARTIFACT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  plan:
    name: Plan checks
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      web: ${{ steps.changes.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            files=""
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            files="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")"
          else
            files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          backend=false
          web=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            backend=true
          fi
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/*|Dockerfile.vercel|vercel.json|.dockerignore|docker/*|docker/**/*|.agents/*|.agents/**/*|server/*|server/**/*|examples/*|examples/**/*)
                backend=true
                ;;
            esac
            case "$file" in
              .github/workflows/*|vercel.json|.dockerignore|docker/*|docker/**/*|web/*|web/**/*)
                web=true
                ;;
            esac
          done <<< "$files"

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"
          {
            echo "## CI plan"
            echo
            echo "- Backend: \`$backend\`"
            echo "- Web: \`$web\`"
          } >> "$GITHUB_STEP_SUMMARY"

  go:
    name: Backend
    needs: plan
    if: ${{ needs.plan.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Test
        working-directory: server
        run: go test ./...
      - name: Build
        working-directory: server
        run: go build -o ../ledger-web ./cmd/ledger-web

  server-image:
    name: Server image
    needs: [plan, go]
    if: ${{ github.event_name != 'pull_request' && needs.plan.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=beancount-ledger-web-server
            org.opencontainers.image.description=Minimal stateless ledger-web API server image
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vercel
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server-image
          cache-to: type=gha,scope=server-image,mode=max

  web:
    name: Frontend
    needs: plan
    if: ${{ needs.plan.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: web
        run: pnpm run typecheck
      - name: Test
        working-directory: web
        run: pnpm run test
      - name: Audit high severity vulnerabilities
        working-directory: web
        run: pnpm audit --audit-level=high
      - name: Build
        working-directory: web
        run: pnpm run build
