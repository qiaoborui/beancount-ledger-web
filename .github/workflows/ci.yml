name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    name: Plan checks
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      web: ${{ steps.changes.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            files="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")"
          else
            files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          backend=false
          web=false
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/ci.yml|.mcp.json|server/*|server/**/*|examples/*|examples/**/*|docker/*|docker/**/*|agent/*|agent/**/*|.pi/*|.pi/**/*)
                backend=true
                ;;
            esac
            case "$file" in
              .github/workflows/ci.yml|web/*|web/**/*|docker/*|docker/**/*)
                web=true
                ;;
            esac
          done <<< "$files"

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"
          {
            echo "## CI plan"
            echo
            echo "- Backend: \`$backend\`"
            echo "- Web: \`$web\`"
          } >> "$GITHUB_STEP_SUMMARY"

  go:
    name: Backend
    needs: plan
    if: ${{ needs.plan.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - uses: actions/setup-node@v4
        if: ${{ hashFiles('agent/package-lock.json') != '' }}
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: agent/package-lock.json
      - name: Test
        working-directory: server
        run: go test ./...
      - name: Build
        working-directory: server
        run: go build ./cmd/ledger-web
      - name: Check agent tools
        if: ${{ hashFiles('agent/package-lock.json') != '' }}
        run: |
          npm ci --prefix agent
          npm run check --prefix agent

  web:
    name: Frontend
    needs: plan
    if: ${{ needs.plan.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Test
        working-directory: web
        run: npm run test
      - name: Audit high severity vulnerabilities
        working-directory: web
        run: npm audit --audit-level=high
      - name: Build
        working-directory: web
        run: npm run build
