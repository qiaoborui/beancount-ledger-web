name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARTIFACT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  plan:
    name: Plan checks
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      web: ${{ steps.changes.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            files="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")"
          else
            files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          backend=false
          web=false
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/ci.yml|.github/workflows/deploy-raspberry-pi.yml|.github/workflows/deploy-vercel.yml|Dockerfile.vercel|.dockerignore|.agents/*|.agents/**/*|server/*|server/**/*|examples/*|examples/**/*|docker/*|docker/**/*|scripts/deploy-backend-artifact.sh)
                backend=true
                ;;
            esac
            case "$file" in
              .github/workflows/ci.yml|.github/workflows/deploy-raspberry-pi.yml|.github/workflows/deploy-vercel.yml|Dockerfile.vercel|.dockerignore|web/*|web/**/*|docker/*|docker/**/*|scripts/deploy-frontend-artifact.sh)
                web=true
                ;;
            esac
          done <<< "$files"

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"
          {
            echo "## CI plan"
            echo
            echo "- Backend: \`$backend\`"
            echo "- Web: \`$web\`"
          } >> "$GITHUB_STEP_SUMMARY"
          mkdir -p ci-plan
          {
            echo "backend=$backend"
            echo "web=$web"
          } > ci-plan/components.env
      - name: Upload CI plan
        uses: actions/upload-artifact@v4
        with:
          name: ledger-web-ci-plan-${{ env.ARTIFACT_SHA }}
          path: ci-plan/components.env
          if-no-files-found: error
          retention-days: 7

  go:
    name: Backend
    needs: plan
    if: ${{ needs.plan.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Test
        working-directory: server
        run: go test ./...
      - name: Build
        working-directory: server
        run: go build -o ../ledger-web ./cmd/ledger-web
      - name: Pack backend artifact
        run: |
          mkdir -p artifact
          cp ledger-web artifact/ledger-web
          if [[ -d examples ]]; then cp -a examples artifact/examples; fi
          if [[ -d .agents ]]; then cp -a .agents artifact/.agents; fi
          cat > artifact/DEPLOYMENT.txt <<EOF
          repository=${{ github.repository }}
          sha=${{ env.ARTIFACT_SHA }}
          ref=${{ github.ref }}
          component=backend
          target=ci
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          tar -czf ledger-web-backend-${{ env.ARTIFACT_SHA }}.tar.gz -C artifact .
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledger-web-backend-${{ env.ARTIFACT_SHA }}
          path: ledger-web-backend-${{ env.ARTIFACT_SHA }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  web:
    name: Frontend
    needs: plan
    if: ${{ needs.plan.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: web
        run: pnpm run typecheck
      - name: Test
        working-directory: web
        run: pnpm run test
      - name: Audit high severity vulnerabilities
        working-directory: web
        run: pnpm audit --audit-level=high
      - name: Build
        working-directory: web
        run: pnpm run build
      - name: Pack frontend artifact
        run: |
          mkdir -p artifact
          cp -a web/dist artifact/dist
          cat > artifact/DEPLOYMENT.txt <<EOF
          repository=${{ github.repository }}
          sha=${{ env.ARTIFACT_SHA }}
          ref=${{ github.ref }}
          component=frontend
          target=ci
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          tar -czf ledger-web-frontend-${{ env.ARTIFACT_SHA }}.tar.gz -C artifact .
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledger-web-frontend-${{ env.ARTIFACT_SHA }}
          path: ledger-web-frontend-${{ env.ARTIFACT_SHA }}.tar.gz
          if-no-files-found: error
          retention-days: 7
