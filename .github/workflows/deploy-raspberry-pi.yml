name: Deploy Ubuntu Server

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        type: choice
        options: [production, preview]
        default: production
      component:
        description: Component to deploy
        type: choice
        options: [all, backend, frontend]
        default: all

concurrency:
  group: deploy-${{ github.event_name == 'workflow_run' && (github.event.workflow_run.event == 'pull_request' && 'preview' || 'production') || inputs.target }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  plan:
    name: Plan component deploys
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.target.outputs.target }}
      short_target: ${{ steps.target.outputs.short_target }}
      backend_port: ${{ steps.target.outputs.backend_port }}
      deploy_backend: ${{ steps.changes.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.changes.outputs.deploy_frontend }}
      deploy_allowed: ${{ steps.changes.outputs.deploy_allowed }}
      artifact_sha: ${{ steps.artifact.outputs.artifact_sha }}
      artifact_run_id: ${{ steps.artifact.outputs.artifact_run_id }}
    steps:
      - name: Select deployment target
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" && "${{ github.event.workflow_run.event }}" == "pull_request" ]]; then
            target="preview"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.target }}" == "preview" ]]; then
            target="preview"
          else
            target="production"
          fi

          if [[ "$target" == "production" ]]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
            echo "short_target=prod" >> "$GITHUB_OUTPUT"
            echo "backend_port=${{ vars.DEPLOY_PROD_PORT || vars.RASPI_PROD_PORT || '3001' }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=preview" >> "$GITHUB_OUTPUT"
            echo "short_target=preview" >> "$GITHUB_OUTPUT"
            echo "backend_port=${{ vars.DEPLOY_PREVIEW_PORT || vars.RASPI_PREVIEW_PORT || '3002' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Select artifact source
        id: artifact
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "artifact_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CI plan
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: ledger-web-ci-plan-${{ steps.artifact.outputs.artifact_sha }}
          path: ci-plan
          run-id: ${{ steps.artifact.outputs.artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Detect changed components
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          deploy_allowed=true
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.component }}" in
              all)
                deploy_backend=true
                deploy_frontend=true
                ;;
              backend)
                deploy_backend=true
                deploy_frontend=false
                ;;
              frontend)
                deploy_backend=false
                deploy_frontend=true
                ;;
            esac
          elif [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
            deploy_allowed=false
            deploy_backend=false
            deploy_frontend=false
          elif [[ "${{ github.event.workflow_run.event }}" == "pull_request" ]]; then
            pr_number="${{ github.event.workflow_run.pull_requests[0].number }}"
            if [[ -z "$pr_number" ]]; then
              deploy_allowed=false
              deploy_backend=false
              deploy_frontend=false
            else
              pr_json="$(gh api "repos/${{ github.repository }}/pulls/$pr_number")"
              draft="$(jq -r '.draft' <<< "$pr_json")"
              head_repo="$(jq -r '.head.repo.full_name' <<< "$pr_json")"
              if [[ "$draft" == "true" || "$head_repo" != "${{ github.repository }}" ]]; then
                deploy_allowed=false
                deploy_backend=false
                deploy_frontend=false
              else
                # shellcheck disable=SC1091
                source ci-plan/components.env
                deploy_backend="$backend"
                deploy_frontend="$web"
              fi
            fi
          else
            # shellcheck disable=SC1091
            source ci-plan/components.env
            deploy_backend="$backend"
            deploy_frontend="$web"
          fi

          echo "deploy_allowed=$deploy_allowed" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=$deploy_backend" >> "$GITHUB_OUTPUT"
          echo "deploy_frontend=$deploy_frontend" >> "$GITHUB_OUTPUT"
          {
            echo "## Deploy plan"
            echo
            echo "- Allowed: \`$deploy_allowed\`"
            echo "- Backend: \`$deploy_backend\`"
            echo "- Frontend: \`$deploy_frontend\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build_backend:
    name: Build backend artifact
    needs: plan
    runs-on: ubuntu-24.04
    if: ${{ needs.plan.outputs.deploy_allowed == 'true' && github.event_name == 'workflow_dispatch' && needs.plan.outputs.deploy_backend == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Test backend
        working-directory: server
        run: go test ./...

      - name: Build backend
        working-directory: server
        run: go build -o ../ledger-web ./cmd/ledger-web

      - name: Pack backend artifact
        run: |
          mkdir -p artifact
          cp ledger-web artifact/ledger-web
          if [[ -d examples ]]; then cp -a examples artifact/examples; fi
          if [[ -d .agents ]]; then cp -a .agents artifact/.agents; fi
          cat > artifact/DEPLOYMENT.txt <<EOF
          repository=${{ github.repository }}
          sha=${{ needs.plan.outputs.artifact_sha }}
          ref=${{ github.ref }}
          component=backend
          target=${{ needs.plan.outputs.target }}
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          tar -czf ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}.tar.gz -C artifact .

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}
          path: ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  build_frontend:
    name: Build frontend artifact
    needs: plan
    runs-on: ubuntu-latest
    if: ${{ needs.plan.outputs.deploy_allowed == 'true' && github.event_name == 'workflow_dispatch' && needs.plan.outputs.deploy_frontend == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        working-directory: web
        run: pnpm run typecheck

      - name: Test frontend
        working-directory: web
        run: pnpm run test

      - name: Audit high severity vulnerabilities
        working-directory: web
        run: pnpm audit --audit-level=high

      - name: Build frontend
        working-directory: web
        run: pnpm run build

      - name: Pack frontend artifact
        run: |
          mkdir -p artifact
          cp -a web/dist artifact/dist
          cat > artifact/DEPLOYMENT.txt <<EOF
          repository=${{ github.repository }}
          sha=${{ needs.plan.outputs.artifact_sha }}
          ref=${{ github.ref }}
          component=frontend
          target=${{ needs.plan.outputs.target }}
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          tar -czf ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}.tar.gz -C artifact .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}
          path: ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy_frontend:
    name: Deploy frontend to Ubuntu Server
    needs: [plan, build_frontend]
    runs-on: [self-hosted, mibook]
    if: ${{ always() && needs.plan.outputs.deploy_allowed == 'true' && needs.plan.outputs.deploy_frontend == 'true' && ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && needs.build_frontend.result == 'success')) }}
    environment:
      name: ${{ needs.plan.outputs.target }}
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4

      - name: Clean old frontend artifacts
        run: rm -rf /tmp/beancount-ledger-web-frontend-*

      - name: Download frontend artifact from CI
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}
          path: /tmp/beancount-ledger-web-frontend-download-${{ needs.plan.outputs.artifact_sha }}
          run-id: ${{ needs.plan.outputs.artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Download frontend artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v4
        with:
          name: ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}
          path: /tmp/beancount-ledger-web-frontend-download-${{ needs.plan.outputs.artifact_sha }}

      - name: Extract frontend artifact
        run: |
          mkdir -p /tmp/beancount-ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}
          tar -xzf "/tmp/beancount-ledger-web-frontend-download-${{ needs.plan.outputs.artifact_sha }}/ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}.tar.gz" \
            -C "/tmp/beancount-ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}"

      - name: Deploy frontend artifact
        env:
          DEPLOY_BASE: ${{ secrets.DEPLOY_BASE || secrets.RASPI_DEPLOY_BASE }}
          FRONTEND_RELOAD_COMMAND: ${{ secrets.FRONTEND_RELOAD_COMMAND || secrets.RASPI_FRONTEND_RELOAD_COMMAND }}
        run: |
          chmod +x scripts/deploy-frontend-artifact.sh
          scripts/deploy-frontend-artifact.sh \
            "${{ needs.plan.outputs.short_target }}" \
            "/tmp/beancount-ledger-web-frontend-${{ needs.plan.outputs.artifact_sha }}"

      - name: Frontend deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Frontend deployment complete

          - Environment: `${{ needs.plan.outputs.target }}`
          - Commit: `${{ needs.plan.outputs.artifact_sha }}`
          EOF

  deploy_backend:
    name: Deploy backend to Ubuntu Server
    needs: [plan, build_backend, deploy_frontend]
    runs-on: [self-hosted, mibook]
    if: ${{ always() && needs.plan.outputs.deploy_allowed == 'true' && needs.plan.outputs.deploy_backend == 'true' && ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && needs.build_backend.result == 'success')) && (needs.plan.outputs.deploy_frontend != 'true' || needs.deploy_frontend.result == 'success') }}
    environment:
      name: ${{ needs.plan.outputs.target }}
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4

      - name: Clean old backend artifacts
        run: rm -rf /tmp/beancount-ledger-web-backend-*

      - name: Download backend artifact from CI
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}
          path: /tmp/beancount-ledger-web-backend-download-${{ needs.plan.outputs.artifact_sha }}
          run-id: ${{ needs.plan.outputs.artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Download backend artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v4
        with:
          name: ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}
          path: /tmp/beancount-ledger-web-backend-download-${{ needs.plan.outputs.artifact_sha }}

      - name: Extract backend artifact
        run: |
          mkdir -p /tmp/beancount-ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}
          tar -xzf "/tmp/beancount-ledger-web-backend-download-${{ needs.plan.outputs.artifact_sha }}/ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}.tar.gz" \
            -C "/tmp/beancount-ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}"

      - name: Deploy backend artifact
        env:
          DEPLOY_BASE: ${{ secrets.DEPLOY_BASE || secrets.RASPI_DEPLOY_BASE }}
          APP_ENV_FILE: ${{ needs.plan.outputs.short_target == 'prod' && (secrets.DEPLOY_PROD_ENV_FILE || secrets.RASPI_PROD_ENV_FILE) || (secrets.DEPLOY_PREVIEW_ENV_FILE || secrets.RASPI_PREVIEW_ENV_FILE) }}
        run: |
          chmod +x scripts/deploy-backend-artifact.sh
          scripts/deploy-backend-artifact.sh \
            "${{ needs.plan.outputs.short_target }}" \
            "${{ needs.plan.outputs.backend_port }}" \
            "/tmp/beancount-ledger-web-backend-${{ needs.plan.outputs.artifact_sha }}"

      - name: Backend deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Backend deployment complete

          - Environment: `${{ needs.plan.outputs.target }}`
          - Port: `${{ needs.plan.outputs.backend_port }}`
          - Commit: `${{ needs.plan.outputs.artifact_sha }}`
          EOF
