name: beancount-ledger-web

x-app-env: &app-env
  env_file:
    - path: ../.env
      required: false

services:
  server:
    <<: *app-env
    profiles: [server]
    image: ${SERVER_IMAGE:-ghcr.io/qiaoborui/beancount-ledger-web-server:latest}
    pull_policy: ${SERVER_PULL_POLICY:-missing}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: ${SERVER_BUILD_TARGET:-server}
    restart: unless-stopped
    ports:
      - "${SERVER_BIND_ADDRESS:-127.0.0.1}:${SERVER_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      SERVE_STATIC: "${SERVE_STATIC:-false}"
      STATIC_DIR: "${STATIC_DIR:-}"
      LEDGER_ROOT: ""
      RUNTIME_DIR: ""
    expose:
      - "3000"

  frontend:
    <<: *app-env
    profiles: [frontend]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  caddy:
    <<: *app-env
    profiles: [caddy]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  indexer:
    <<: *app-env
    profiles: [indexer]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: indexer
    restart: "no"
    environment:
      LEDGER_ROOT: /data/ledger
      BEAN_CHECK_BIN: "${BEAN_CHECK_BIN:-bean-check}"
      POSTGRES_MAX_OPEN_CONNS: "${POSTGRES_MAX_OPEN_CONNS:-2}"
      POSTGRES_MAX_IDLE_CONNS: "${POSTGRES_MAX_IDLE_CONNS:-1}"
      POSTGRES_CONN_MAX_IDLE_SECONDS: "${POSTGRES_CONN_MAX_IDLE_SECONDS:-60}"
    volumes:
      - ${LEDGER_HOST_PATH:-../examples/preview-ledger}:/data/ledger:${LEDGER_MOUNT_MODE:-ro}

volumes:
  caddy_data:
    name: ${CADDY_DATA_VOLUME:-beancount-ledger-web_caddy_data}
    external: ${CADDY_VOLUMES_EXTERNAL:-false}
  caddy_config:
    name: ${CADDY_CONFIG_VOLUME:-beancount-ledger-web_caddy_config}
    external: ${CADDY_VOLUMES_EXTERNAL:-false}
